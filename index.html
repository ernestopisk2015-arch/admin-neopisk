<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GruPay Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc,
  onSnapshot, updateDoc, addDoc, deleteDoc, query, where,
  orderBy, serverTimestamp, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBhnAKQfADIdNX4brbG-YdTEr-DKFta7jE",
  authDomain:        "neopisk.firebaseapp.com",
  projectId:         "neopisk",
  storageBucket:     "neopisk.appspot.com",
  messagingSenderId: "873475816427",
  appId:             "1:873475816427:web:fa8ca59cb85a2c1d00f7ae"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let grupos   = {};
let pedidos  = [];
let soportes = [];
let activeTab    = "pagos";
let filtroEstado = "todos";

document.addEventListener("DOMContentLoaded", initListeners);

function initListeners() {
  onSnapshot(query(collection(db,"grupay_groups"), orderBy("created_at","desc")), snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type==="removed") delete grupos[ch.doc.id];
      else grupos[ch.doc.id] = { id:ch.doc.id, ...ch.doc.data() };
    });
    if (activeTab==="grupos") renderGrupos();
    updateStats();
  });
  onSnapshot(query(collection(db,"grupay_pedidos"), orderBy("fecha","desc")), snap => {
    pedidos = snap.docs.map(d => ({ _id:d.id, ...d.data() }));
    if (activeTab==="pagos") renderPagos();
    updateStats();
  });
  onSnapshot(query(collection(db,"grupay_soporte"), orderBy("fecha","desc")), snap => {
    soportes = snap.docs.map(d => ({ _id:d.id, ...d.data() }));
    if (activeTab==="soporte") renderSoporte();
    updateStats();
  });
}

function updateStats() {
  const pend  = pedidos.filter(p => p.payment_status==="uploaded");
  const verif = pedidos.filter(p => p.payment_status==="verified");
  const spend = soportes.filter(s => s.estado==="pendiente");
  document.getElementById("stat-pendientes").textContent   = pend.length;
  document.getElementById("stat-verificados").textContent  = verif.length;
  document.getElementById("stat-soporte").textContent      = spend.length;
  document.getElementById("stat-total-grupos").textContent = Object.values(grupos).length;
  const bp = document.getElementById("tab-badge-pagos");
  bp.textContent = pend.length; bp.style.display = pend.length>0?"flex":"none";
  const bs = document.getElementById("tab-badge-soporte");
  bs.textContent = spend.length; bs.style.display = spend.length>0?"flex":"none";
}

// ── TAB PAGOS ─────────────────────────────────────────────────────────────────
function renderPagos() {
  const container = document.getElementById("tab-content");
  let lista = filtroEstado==="todos" ? pedidos : pedidos.filter(p => p.payment_status===filtroEstado);

  // ✅ CORREGIDO: agrupar carritos por tel + timestamp + sector (no por monto que puede ser "")
  const agrupados = {};
  lista.forEach(p => {
    const key = p.carrito
      ? `${p.tel}_${p.fecha?.seconds || p.fecha || p._id}_${p.sector}`
      : p._id;
    if (!agrupados[key]) agrupados[key] = [];
    agrupados[key].push(p);
  });

  const totalPend  = pedidos.filter(p => p.payment_status==="uploaded").length;
  const totalVerif = pedidos.filter(p => p.payment_status==="verified").length;
  const totalRech  = pedidos.filter(p => p.payment_status==="rejected").length;
  const SC = { uploaded:"#d97706", verified:"#16a34a", rejected:"#dc2626" };
  const SL = { uploaded:"⏳ Pendiente", verified:"✅ Aprobado", rejected:"❌ Rechazado" };

  container.innerHTML = `
    <div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;">
      ${[["todos","🗂 Todos",pedidos.length,"#1e293b"],["uploaded","⏳ Pendientes",totalPend,"#d97706"],
         ["verified","✅ Aprobados",totalVerif,"#16a34a"],["rejected","❌ Rechazados",totalRech,"#dc2626"]]
        .map(([val,lbl,cnt,col])=>`
        <button onclick="window._filtrar('${val}')"
          style="flex-shrink:0;padding:7px 14px;border-radius:99px;border:2px solid ${filtroEstado===val?col:'#e2e8f0'};
          background:${filtroEstado===val?col:'#fff'};color:${filtroEstado===val?'#fff':col==='#1e293b'?'#64748b':col};
          font-family:'Syne',sans-serif;font-weight:800;font-size:11px;cursor:pointer;white-space:nowrap;
          box-shadow:${filtroEstado===val?`0 2px 8px ${col}44`:'none'};transition:all .2s;">
          ${lbl} <span style="background:${filtroEstado===val?'rgba(255,255,255,.3)':'#f1f5f9'};
            color:${filtroEstado===val?'#fff':'#64748b'};font-size:10px;font-weight:900;
            padding:1px 6px;border-radius:99px;margin-left:2px;">${cnt}</span>
        </button>`).join("")}
    </div>
    ${!Object.keys(agrupados).length
      ? `<div class="empty-card"><div class="empty-icon">${filtroEstado==="uploaded"?"🎉":"📭"}</div>
         <div class="empty-title">${filtroEstado==="uploaded"?"¡Sin pagos pendientes!":"Sin pedidos"}</div>
         ${filtroEstado==="uploaded"?`<div class="empty-sub">Todos los pagos están al día 👍</div>`:""}</div>`
      : Object.values(agrupados).map(grupo => {
          const p = grupo[0];
          const esCarrito = grupo.length > 1;

          // ✅ CORREGIDO: calcular monto real sumando los productos del grupo
          // Si el monto está guardado correctamente, usarlo; si no, calcularlo desde precio
          let monto = 0;
          if (esCarrito) {
            // Para carritos: sumar todos los montos individuales del grupo
            monto = grupo.reduce((s, x) => {
              const m = parseFloat(x.monto);
              if (!isNaN(m) && m > 0) return s + m;
              // Fallback: calcular desde precio y descuento
              const precio = parseFloat(x.precio_normal) || 0;
              const hasDesc = x.has_discount !== false && !x.sin_descuento;
              return s + (hasDesc ? Math.round(precio * 0.9 * 10) / 10 : precio);
            }, 0);
          } else {
            // Para pedidos individuales
            const m = parseFloat(p.monto);
            if (!isNaN(m) && m > 0) {
              monto = m;
            } else {
              // Fallback: calcular desde precio
              const precio = parseFloat(p.precio_normal) || 0;
              const hasDesc = p.has_discount !== false && !p.sin_descuento;
              monto = hasDesc ? Math.round(precio * 0.9 * 10) / 10 : precio;
            }
          }

          const fecha = p.fecha?.toDate?.() ? formatFecha(p.fecha.toDate()) : "—";
          const ids   = grupo.map(x=>x._id).join(",");
          const productos = grupo.map(x=>`<span style="background:#f1f5f9;border-radius:6px;padding:2px 6px;font-size:10px;">${x.producto_emoji||"📦"} ${x.producto_nombre}</span>`).join(" ");
          const estado = p.payment_status;
          const col    = SC[estado]||"#9ca3af";
          const waNum  = `51${(p.tel||"").replace(/\D/g,"")}`;
          const delivText = p.delivery_costo>0
            ? `<span style="background:#fef9c3;color:#854d0e;border-radius:6px;padding:2px 6px;font-size:10px;">🚚 Delivery S/${parseFloat(p.delivery_costo).toFixed(1)}</span>`
            : p.delivery_gratis
              ? `<span style="background:#dcfce7;color:#15803d;border-radius:6px;padding:2px 6px;font-size:10px;">🚚 Delivery GRATIS</span>`
              : "";

          // ✅ Desglose de productos para carritos
          const desglose = esCarrito ? `
            <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px;margin-bottom:10px;">
              <div style="font-size:9px;font-weight:900;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-family:'DM Mono',monospace;">Desglose de productos</div>
              ${grupo.map(x => {
                const pr = parseFloat(x.precio_normal) || 0;
                const hasDesc = x.has_discount !== false && !x.sin_descuento;
                const pUnit = hasDesc ? Math.round(pr * 0.9 * 10) / 10 : pr;
                const xMonto = parseFloat(x.monto);
                const montoFinal = (!isNaN(xMonto) && xMonto > 0) ? xMonto : pUnit;
                return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #e2e8f0;font-size:12px;">
                  <span>${x.producto_emoji||"📦"} ${x.producto_nombre}</span>
                  <span style="font-weight:800;color:${hasDesc?'#16a34a':'#1e293b'};">S/${montoFinal.toFixed(1)} ${hasDesc?'<span style="font-size:9px;background:#dcfce7;color:#14532d;padding:1px 4px;border-radius:4px;">10%OFF</span>':''}</span>
                </div>`;
              }).join("")}
              <div style="display:flex;justify-content:space-between;padding-top:6px;font-family:'Syne',sans-serif;font-weight:900;font-size:13px;">
                <span>Total</span>
                <span style="color:#16a34a;">S/${monto.toFixed(1)}</span>
              </div>
            </div>` : "";

          return `<div class="pago-card" style="border-left:4px solid ${col};">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <span style="background:${col}18;color:${col};border:1.5px solid ${col}44;font-size:10px;font-weight:800;padding:3px 10px;border-radius:99px;font-family:'DM Mono',monospace;">${SL[estado]||estado}</span>
              <span style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;">${fecha}</span>
            </div>
            <div class="pago-header">
              <div class="pago-avatar" style="background:${col}18;border-color:${col}44;">${esCarrito?"🛒":(p.producto_emoji||"📦")}</div>
              <div class="pago-info">
                <div class="pago-nombre">
                  ${p.nombre||"Cliente"}
                  ${p.es_lider?`<span style="background:#7c3aed;color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:99px;margin-left:6px;">👑 LÍDER</span>`:""}
                  ${p.sin_descuento?`<span style="background:#fef3c7;color:#d97706;font-size:9px;font-weight:800;padding:2px 7px;border-radius:99px;margin-left:4px;">⚠ SIN DESC.</span>`:""}
                </div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin:4px 0;">
                  <a href="https://wa.me/${waNum}" target="_blank" style="background:#dcfce7;color:#15803d;border:1.5px solid #bbf7d0;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px;">💬 ${p.tel||"—"}</a>
                  <span style="background:#f1f5f9;color:#475569;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;">📍 ${p.sector||"—"}</span>
                  ${delivText}
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">${productos}</div>
              </div>
              <div class="pago-monto" style="color:${col};">S/${monto.toFixed(1)}</div>
            </div>
            ${desglose}
            <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px;margin-bottom:12px;">
              <div style="font-size:9px;font-weight:900;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-family:'DM Mono',monospace;">Datos de entrega</div>
              <div style="display:flex;flex-direction:column;gap:5px;">
                <div style="display:flex;gap:6px;"><span>📍</span><div><div style="font-size:9px;color:#94a3b8;font-weight:600;">Dirección</div><div style="font-size:12px;font-weight:700;color:${p.direccion?"#1e293b":"#ef4444"};">${p.direccion||"⚠ No registrada"}</div></div></div>
                ${p.referencia?`<div style="display:flex;gap:6px;"><span>🚪</span><div><div style="font-size:9px;color:#94a3b8;font-weight:600;">Referencia</div><div style="font-size:12px;font-weight:700;">${p.referencia}</div></div></div>`:""}
                ${p.horario?`<div style="display:flex;gap:6px;"><span>🕐</span><div><div style="font-size:9px;color:#94a3b8;font-weight:600;">Horario</div><div style="font-size:12px;font-weight:700;">${p.horario}</div></div></div>`:""}
              </div>
            </div>
            ${p.payment_screenshot_url
              ? `<div class="screenshot-wrap" onclick="window._verCaptura('${p.payment_screenshot_url}')"><img src="${p.payment_screenshot_url}" class="screenshot-thumb" alt="Captura"><div class="screenshot-overlay">🔍 Ver completa</div></div>`
              : `<div class="no-screenshot">📭 Sin captura de pago</div>`}
            ${estado==="uploaded" ? `
            <div class="pago-actions">
              <button class="btn-aprobar" onclick="window._aprobarPedidos('${ids}','${p.tel||''}','${p.nombre||''}',${monto})">✅ Aprobar S/${monto.toFixed(1)}</button>
              <button class="btn-rechazar" onclick="window._rechazarPedidos('${ids}')">❌ Rechazar</button>
              <button onclick="window._borrarPedidosGrupo('${ids}')" style="flex:0 0 40px;padding:12px 8px;background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca;border-radius:10px;font-size:14px;cursor:pointer;">🗑</button>
              <a class="btn-wa-pago" href="https://wa.me/${waNum}?text=${encodeURIComponent(`Hola ${p.nombre||''}! 👋 Vi tu pedido de GruPay por S/${monto.toFixed(1)}. ¿Tienes alguna consulta?`)}" target="_blank">💬</a>
            </div>` : `
            <div style="margin-top:8px;">
              <a href="https://wa.me/${waNum}?text=${encodeURIComponent(`Hola ${p.nombre||''}! 👋 Te escribo por tu pedido de GruPay.`)}" target="_blank"
                style="flex:1;display:block;padding:10px;background:#f0fdf4;color:#15803d;border:2px solid #bbf7d0;
                border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;text-align:center;text-decoration:none;">
                💬 Contactar
              </a>
              <button onclick="window._borrarPedidosGrupo('${ids}')" style="padding:10px 14px;background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca;border-radius:10px;font-size:14px;cursor:pointer;">🗑</button>
            </div>`}
          </div>`;
        }).join("")}`;
}

window._filtrar = (estado) => { filtroEstado = estado; renderPagos(); };

window._aprobarPedidos = async (idsStr, tel, nombre, monto) => {
  const ids = idsStr.split(",");
  document.querySelectorAll(".btn-aprobar,.btn-rechazar").forEach(b => { b.disabled=true; b.style.opacity="0.5"; });
  try {
    for (const id of ids) {
      await updateDoc(doc(db,"grupay_pedidos",id), { payment_status:"verified", verified_at:serverTimestamp() });
      const pedido = pedidos.find(p => p._id===id);
      if (pedido?.sector_id && pedido?.producto_id) {
        try {
          const mSnap = await getDocs(query(
            collection(db,"grupay_groups",pedido.producto_id,"sectors",pedido.sector_id,"members"),
            where("tel","==",pedido.tel)));
          for (const m of mSnap.docs) await updateDoc(m.ref, { payment_status:"verified", verified_at:serverTimestamp() });
        } catch(e) { console.warn("member:", e.message); }
      }
    }
    const waNum = `51${tel.replace(/\D/g,"")}`;
    const msg = encodeURIComponent(`✅ ¡Hola ${nombre}! Tu pago de S/${parseFloat(monto).toFixed(1)} en GruPay fue *aprobado*. Pronto coordinaremos la entrega. 🛒`);
    if (confirm("¿Enviar confirmación al cliente por WhatsApp?")) window.open(`https://wa.me/${waNum}?text=${msg}`,"_blank");
    showToast("✅ Pago aprobado");
  } catch(e) { showToast("❌ Error: "+e.message); }
};

window._rechazarPedidos = async (idsStr) => {
  if (!confirm("¿Rechazar este pago?")) return;
  for (const id of idsStr.split(",")) await updateDoc(doc(db,"grupay_pedidos",id), { payment_status:"rejected" });
  showToast("🗑 Pago rechazado");
};

// ── TAB GRUPOS ─────────────────────────────────────────────────────────────────
function renderGrupos() {
  const container = document.getElementById("tab-content");
  const lista = Object.values(grupos);
  if (!lista.length) {
    container.innerHTML = `<div class="empty-card"><div class="empty-icon">📦</div><div class="empty-title">Sin productos</div><div class="empty-sub">Crea el primero desde ➕</div></div>`;
    return;
  }
  const activos  = lista.filter(g => g.status!=="paused" && g.status!=="cancelled");
  const pausados = lista.filter(g => g.status==="paused" || g.status==="cancelled");
  const SC = { open:"#f59e0b", active:"#22c55e", paused:"#64748b", cancelled:"#ef4444", completed:"#6366f1" };
  const SL = { open:"Abierto", active:"Activo ✅", paused:"⏸ Pausado", cancelled:"Cancelado", completed:"Completado" };
  const renderLista = (arr) => arr.map(g => {
    const col = SC[g.status]||"#9ca3af";
    const pend  = pedidos.filter(p => p.producto_id===g.id && p.payment_status==="uploaded").length;
    const verif = pedidos.filter(p => p.producto_id===g.id && p.payment_status==="verified").length;
    const grey  = g.status==="paused"||g.status==="cancelled";
    return `<div class="grupo-card" onclick="window._verGrupo('${g.id}')">
      <div class="grupo-left">
        ${g.image_url
          ? `<img src="${g.image_url}" style="width:42px;height:42px;object-fit:cover;border-radius:10px;border:1.5px solid #e2e8f0;${grey?'filter:grayscale(1);opacity:.5':''}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="grupo-emoji" style="display:none;">${g.emoji||"📦"}</div>`
          : `<div class="grupo-emoji" style="${grey?'filter:grayscale(1);opacity:.5':''}">${g.emoji||"📦"}</div>`
        }
        <div>
          <div class="grupo-name" style="${grey?'color:var(--muted)':''}">${g.product_name}</div>
          <div class="grupo-zone">📍 ${g.zone||"—"} · ${g.unit||"kg"}</div>
          <div style="display:flex;gap:6px;margin-top:4px;">
            ${pend>0?`<span style="background:#fef9c3;color:#854d0e;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;">⏳ ${pend} pend.</span>`:""}
            ${verif>0?`<span style="background:#dcfce7;color:#15803d;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;">✅ ${verif} ok</span>`:""}
          </div>
        </div>
      </div>
      <div class="grupo-right">
        <div class="grupo-status" style="background:${col}22;color:${col};border:1px solid ${col}44;">${SL[g.status]||g.status}</div>
        <div class="grupo-price" style="${grey?'color:var(--muted)':''}">S/${(g.price_per_unit||0).toFixed(2)}</div>
        <div class="grupo-arrow">›</div>
      </div>
    </div>`;
  }).join("");
  container.innerHTML =
    (activos.length  ? `<div class="section-label" style="margin-bottom:8px;">🟢 Activos (${activos.length})</div>${renderLista(activos)}` : "") +
    (pausados.length ? `<div class="section-label" style="margin:16px 0 8px;color:var(--muted);">⏸ Pausados (${pausados.length})</div>${renderLista(pausados)}` : "");
}

window._verGrupo = (groupId) => {
  const g = grupos[groupId]; if (!g) return;
  activeTab = "detalle";
  const pedidosG = pedidos.filter(p => p.producto_id===groupId);
  const SC = { uploaded:"#f59e0b", verified:"#22c55e", rejected:"#ef4444" };
  const SL = { uploaded:"Pendiente", verified:"Aprobado", rejected:"Rechazado" };
  const isPaused = g.status==="paused";

  document.getElementById("tab-content").innerHTML = `
    <div class="detalle-header">
      <button class="btn-back" onclick="window._setTab('grupos')">← Grupos</button>
      <span class="detalle-title">${g.emoji||"📦"} ${g.product_name}</span>
    </div>
    <div class="detalle-stats-row">
      <div class="d-stat"><div class="d-stat-v">${pedidosG.filter(p=>p.payment_status==="verified").length}</div><div class="d-stat-l">Pagados</div></div>
      <div class="d-stat"><div class="d-stat-v">${pedidosG.filter(p=>p.payment_status==="uploaded").length}</div><div class="d-stat-l">Pendientes</div></div>
      <div class="d-stat"><div class="d-stat-v">S/${(g.price_per_unit||0).toFixed(2)}</div><div class="d-stat-l">Precio</div></div>
      <div class="d-stat"><div class="d-stat-v" style="color:${isPaused?'#64748b':'#16a34a'}">${isPaused?"⏸":"🟢"}</div><div class="d-stat-l">Estado</div></div>
    </div>

    <div style="background:#fff;border:2px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'DM Mono',monospace;">✏️ Editar producto</div>
        <button onclick="window._guardarProducto('${groupId}')"
          style="background:linear-gradient(135deg,#14532d,#16a34a);color:#fff;border:none;
          border-radius:10px;padding:8px 16px;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;cursor:pointer;">
          💾 Guardar cambios
        </button>
      </div>
      <div style="display:grid;grid-template-columns:56px 1fr;gap:10px;margin-bottom:10px;">
        <div><label class="form-label">Emoji</label><input id="ed-emoji" class="form-input" value="${g.emoji||'📦'}" maxlength="2" style="text-align:center;font-size:20px;padding:8px;margin-bottom:0;"></div>
        <div><label class="form-label">Nombre</label><input id="ed-nombre" class="form-input" value="${g.product_name||''}" style="margin-bottom:0;"></div>

let edFotoUrl = "";
let edFotoSubiendo = false;

window._edFotoSeleccionada = async (input, gid) => {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast("⚠ La imagen supera 5MB"); return; }
  const btnGuardar = document.querySelector("button[onclick*='_guardarProducto']");
  if (btnGuardar) { btnGuardar.disabled = true; btnGuardar.textContent = "⏳ Subiendo foto..."; }
  edFotoSubiendo = true;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById("ed-foto-preview");
    const ph   = document.getElementById("ed-foto-placeholder");
    if (prev) { prev.src = e.target.result; prev.style.display = "block"; }
    if (ph)   { ph.style.display = "none"; }
  };
  reader.readAsDataURL(file);
  const prog   = document.getElementById("ed-foto-progreso");
  const barra  = document.getElementById("ed-foto-barra");
  const status = document.getElementById("ed-foto-status");
  if (prog) prog.style.display = "block";
  edFotoUrl = "";
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "grupay_unsigned");
  formData.append("folder", "grupay/productos");
  try {
    let fakeP = 0;
    const tick = setInterval(() => { fakeP = Math.min(fakeP + 12, 85); if (barra) barra.style.width = fakeP + "%"; }, 200);
    const res  = await fetch("https://api.cloudinary.com/v1_1/dyi3mbeqo/image/upload", { method:"POST", body:formData });
    const data = await res.json();
    clearInterval(tick);
    if (data.secure_url) {
      edFotoUrl = data.secure_url;
      edFotoSubiendo = false;
      if (barra)  barra.style.width = "100%";
      if (status) status.textContent = "✅ Foto lista";
      const area = document.getElementById("ed-foto-area");
      if (area) area.style.borderColor = "var(--green)";
      showToast("📸 Foto subida correctamente");
      const btnG = document.querySelector("button[onclick*='_guardarProducto']");
      if (btnG) { btnG.disabled = false; btnG.textContent = "💾 Guardar cambios"; }
    } else { throw new Error(data.error?.message || "Sin URL"); }
  } catch(e) {
    edFotoSubiendo = false;
    if (status) { status.textContent = "❌ Error: " + e.message; status.style.color = "var(--red)"; }
    showToast("❌ Error al subir foto: " + e.message);
    const btnG = document.querySelector("button[onclick*='_guardarProducto']");
    if (btnG) { btnG.disabled = false; btnG.textContent = "💾 Guardar cambios"; }
  }
};

window._guardarProducto = async (gid) => {
  const nombre = document.getElementById("ed-nombre").value.trim();
  const emoji  = document.getElementById("ed-emoji").value.trim()||"📦";
  const precio = parseFloat(document.getElementById("ed-precio").value);
  const unit   = document.getElementById("ed-unit").value.trim()||"kg";
  const zona   = document.getElementById("ed-zona").value.trim();
  if (!nombre||isNaN(precio)||precio<=0) { showToast("⚠ Nombre y precio son requeridos"); return; }
  if (edFotoSubiendo) { showToast("⏳ Espera, la foto aún se está subiendo..."); return; }
  try {
    const updates = { product_name:nombre, emoji, price_per_unit:precio, unit, zone:zona, delivery_point:zona };
    if (edFotoUrl) { updates.image_url = edFotoUrl; edFotoUrl = ""; }
    await updateDoc(doc(db,"grupay_groups",gid), updates);
    showToast("✅ Producto actualizado");
  } catch(e) { showToast("❌ Error: "+e.message); }
};

window._borrarPedido = async (pedidoId) => {

  const ids = idsStr.split(',');

window._borrarSector = async (groupId, sectorId, sectorNombre) => {
  if (!confirm('¿Borrar el sector "'+sectorNombre+'"?')) return;
  try {
    const mSnap = await getDocs(collection(db,'grupay_groups',groupId,'sectors',sectorId,'members'));
    for (const m of mSnap.docs) await deleteDoc(m.ref);
    await deleteDoc(doc(db,'grupay_groups',groupId,'sectors',sectorId));
    showToast('🗑 Sector eliminado');
    cargarSectoresAdmin(groupId);
  } catch(e) { showToast('❌ '+e.message); }
};

window.cargarSectoresAdmin = async (groupId) => {
  const el = document.getElementById('sectores-admin-'+groupId);
  if (!el) return;
  try {
    const snap = await getDocs(collection(db,'grupay_groups',groupId,'sectors'));
    if (!snap.empty) {
      el.innerHTML = snap.docs.map(d => {
        const s = d.data();
        const nom = (s.sector_name||d.id).replace(/'/g,"\\'");
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;margin-bottom:6px;">'

            style="background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;">🗑 Borrar</button>'

    if (el) el.innerHTML = '<div style="font-size:12px;color:#64748b;">Error cargando</div>';
  }
};

        </div>

          ${s.tel?`<a href="https://wa.me/${waNum}?text=${encodeURIComponent(`Hola ${s.nombre||''}! 👋 Vi que necesitas ayuda con GruPay. ¿En qué te puedo ayudar?`)}" target="_blank" style="flex:1;padding:10px;background:#f0fdf4;color:#15803d;border:2px solid #bbf7d0;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;text-align:center;text-decoration:none;display:block;">💬 WhatsApp ${s.tel}</a>`:`<div style="flex:1;padding:10px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:10px;font-size:12px;color:var(--muted);text-align:center;">Sin número</div>`}
          ${esPend?`<button onclick="window._marcarAtendido('${s._id}')" style="padding:10px 14px;background:#f0fdf4;color:#15803d;border:2px solid #bbf7d0;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;cursor:pointer;">✅ Atendido</button>`:""}
        </div>
      </div>`;
    }).join("")}`;
  };
  container.innerHTML = bloque(pend,"⏳ Pendientes","#d97706") + bloque(atend,"✅ Atendidos","#16a34a");
}

window._marcarAtendido = async (id) => {
  await updateDoc(doc(db,"grupay_soporte",id), { estado:"atendido", atendido_at:serverTimestamp() });
  showToast("✅ Consulta atendida");
};

// ── TABS ──────────────────────────────────────────────────────────────────────
window._setTab = (tab) => {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("tab-active", b.dataset.tab===tab));
  if (tab==="pagos")   renderPagos();
  if (tab==="grupos")  renderGrupos();
  if (tab==="nuevo")   renderNuevoGrupo();
  if (tab==="soporte") renderSoporte();
};

window._verCaptura = (url) => { document.getElementById("lightbox-img").src=url; document.getElementById("lightbox").classList.add("on"); };
window._cerrarLightbox = () => document.getElementById("lightbox").classList.remove("on");

function formatFecha(d) { return d.toLocaleString("es-PE",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}); }
let _tt;
function showToast(msg,dur=3000){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove("on"),dur); }
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{

.topbar-name{font-size:17px;font-weight:900;letter-spacing:-.5px;}
.topbar-name span{color:var(--green);}
.topbar-badge{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;}
.stats-bar{display:flex;background:#fff;border-bottom:2px solid var(--border);flex-shrink:0;}
.stat-item{flex:1;padding:10px 6px;text-align:center;border-right:1px solid var(--border);}
.stat-item:last-child{border-right:none;}

.stat-num.amber{color:var(--amber);}
.stat-num.green{color:var(--green);}
.scroll-area{flex:1;overflow-y:auto;padding:14px;background:var(--bg);}
.tabs{display:flex;border-top:2px solid var(--border);flex-shrink:0;background:#fff;}
.tab-btn{flex:1;padding:11px 4px 10px;background:none;border:none;

  position:relative;transition:color .2s;}
.tab-btn.tab-active{color:var(--green);}
.tab-btn.tab-active::after{content:'';position:absolute;top:0;left:20%;right:20%;
  height:2px;background:var(--green);border-radius:0 0 3px 3px;}
.tab-icon{font-size:18px;}
.tab-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);

  display:none;align-items:center;justify-content:center;}
.pago-card{background:#fff;border:2px solid var(--border);border-radius:16px;

  box-shadow:0 2px 8px rgba(0,0,0,.04);}
.pago-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.pago-avatar{width:46px;height:46px;background:var(--amber-l);border:1.5px solid var(--amber-b);

.pago-info{flex:1;}
.pago-nombre{font-size:15px;font-weight:800;margin-bottom:2px;}
.pago-monto{font-size:24px;font-weight:900;color:var(--amber);flex-shrink:0;}
.screenshot-wrap{position:relative;border-radius:12px;overflow:hidden;

.screenshot-wrap:hover .screenshot-overlay,.screenshot-wrap:active .screenshot-overlay{opacity:1;}
.no-screenshot{background:var(--bg);border:2px dashed var(--border);border-radius:10px;

.pago-actions{display:flex;gap:8px;}
.btn-aprobar{flex:2;padding:12px;background:var(--green-l);color:var(--green-d);

.btn-rechazar{flex:1;padding:12px;background:var(--red-l);color:var(--red);

.grupo-arrow{font-size:18px;color:var(--subtle);}
.detalle-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.btn-back{background:#fff;border:2px solid var(--border);color:var(--muted);

.detalle-title{font-size:15px;font-weight:900;flex:1;}

.section-label{font-size:10px;font-weight:900;color:var(--muted);

.member-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
.member-avatar{width:36px;height:36px;border-radius:10px;display:flex;

.member-info{flex:1;}
.member-name{font-size:13px;font-weight:800;}
.member-meta{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}

.form-section{padding-bottom:24px;}

.form-input:focus{border-color:var(--green);}
.btn-crear-grupo{width:100%;padding:15px;background:linear-gradient(135deg,#14532d,#16a34a);

.empty-card{text-align:center;padding:60px 20px;}

</style>
</head>
