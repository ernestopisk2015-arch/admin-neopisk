<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GruPay Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc,
  onSnapshot, updateDoc, addDoc, query, where,
  orderBy, serverTimestamp, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBhnAKQfADIdNX4brbG-YdTEr-DKFta7jE",
  authDomain:        "neopisk.firebaseapp.com",
  projectId:         "neopisk",
  storageBucket:     "neopisk.appspot.com",
  messagingSenderId: "873475816427",
  appId:             "1:873475816427:web:fa8ca59cb85a2c1d00f7ae"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let grupos   = {};
let pedidos  = [];
let soportes = [];
let activeTab = "pagos";
let filtroEstado = "todos"; // todos | uploaded | verified | rejected

document.addEventListener("DOMContentLoaded", initListeners);

function initListeners() {
  // Grupos (productos)
  onSnapshot(
    query(collection(db, "grupay_groups"), orderBy("created_at","desc")),
    snap => {
      snap.docChanges().forEach(ch => {
        if (ch.type === "removed") delete grupos[ch.doc.id];
        else grupos[ch.doc.id] = { id: ch.doc.id, ...ch.doc.data() };
      });
      renderGrupos(); updateStats();
    }
  );

  // PEDIDOS — lee grupay_pedidos directamente
  onSnapshot(
    query(collection(db, "grupay_pedidos"), orderBy("fecha","desc")),
    snap => {
      pedidos = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
      renderPagos(); updateStats();
    }
  );

  // SOPORTE — lee grupay_soporte en tiempo real
  onSnapshot(
    query(collection(db, "grupay_soporte"), orderBy("fecha","desc")),
    snap => {
      soportes = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
      renderSoporte(); updateStats();
    }
  );
}

function updateStats() {
  const pend   = pedidos.filter(p => p.payment_status === "uploaded");
  const verif  = pedidos.filter(p => p.payment_status === "verified");
  const spend  = soportes.filter(s => s.estado === "pendiente");
  const lista  = Object.values(grupos);
  document.getElementById("stat-pendientes").textContent      = pend.length;
  document.getElementById("stat-verificados").textContent     = verif.length;
  document.getElementById("stat-soporte").textContent         = spend.length;
  document.getElementById("stat-total-grupos").textContent    = lista.length;
  const badge = document.getElementById("tab-badge-pagos");
  badge.textContent = pend.length;
  badge.style.display = pend.length > 0 ? "flex" : "none";
  const badgeS = document.getElementById("tab-badge-soporte");
  badgeS.textContent = spend.length;
  badgeS.style.display = spend.length > 0 ? "flex" : "none";
}

// ── TAB PAGOS ─────────────────────────────────────────────────────────────────
function renderPagos() {
  if (activeTab !== "pagos") return;
  const container = document.getElementById("tab-content");

  // Filtrar según estado seleccionado
  let lista = pedidos;
  if (filtroEstado !== "todos") lista = pedidos.filter(p => p.payment_status === filtroEstado);

  // Agrupar por carrito (mismo tel + monto + sector, pedidos con carrito:true del mismo momento)
  const agrupados = {};
  lista.forEach(p => {
    const key = p.carrito ? `${p.tel}_${p.monto}_${p.sector}` : p._id;
    if (!agrupados[key]) agrupados[key] = [];
    agrupados[key].push(p);
  });

  const totalPend = pedidos.filter(p => p.payment_status === "uploaded").length;
  const totalVerif = pedidos.filter(p => p.payment_status === "verified").length;
  const totalRech = pedidos.filter(p => p.payment_status === "rejected").length;

  const SC = { uploaded:"#d97706", verified:"#16a34a", rejected:"#dc2626" };
  const SL = { uploaded:"⏳ Pendiente", verified:"✅ Aprobado", rejected:"❌ Rechazado" };

  container.innerHTML = `
    <!-- FILTROS -->
    <div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;">
      ${[
        ["todos","🗂 Todos", pedidos.length, "#1e293b"],
        ["uploaded","⏳ Pendientes", totalPend, "#d97706"],
        ["verified","✅ Aprobados", totalVerif, "#16a34a"],
        ["rejected","❌ Rechazados", totalRech, "#dc2626"]
      ].map(([val,lbl,cnt,col])=>`
        <button onclick="window._filtrar('${val}')"
          style="flex-shrink:0;padding:7px 14px;border-radius:99px;border:2px solid ${filtroEstado===val?col:'#e2e8f0'};
          background:${filtroEstado===val?col:'#fff'};color:${filtroEstado===val?'#fff':col==='#1e293b'?'#64748b':col};
          font-family:'Syne',sans-serif;font-weight:800;font-size:11px;cursor:pointer;white-space:nowrap;
          box-shadow:${filtroEstado===val?`0 2px 8px ${col}44`:'none'};transition:all .2s;">
          ${lbl} <span style="background:${filtroEstado===val?'rgba(255,255,255,.3)':'#f1f5f9'};color:${filtroEstado===val?'#fff':'#64748b'};font-size:10px;font-weight:900;padding:1px 6px;border-radius:99px;margin-left:2px;">${cnt}</span>
        </button>`).join("")}
    </div>

    ${!Object.keys(agrupados).length
      ? `<div class="empty-card">
           <div class="empty-icon">${filtroEstado==="uploaded"?"🎉":filtroEstado==="verified"?"📭":filtroEstado==="rejected"?"📭":"📭"}</div>
           <div class="empty-title">${filtroEstado==="uploaded"?"¡Sin pagos pendientes!":filtroEstado==="verified"?"Aún no hay pagos aprobados":filtroEstado==="rejected"?"Sin rechazados":"Sin pedidos aún"}</div>
           ${filtroEstado==="uploaded"?`<div style="font-size:12px;color:#64748b;margin-top:4px;">Todos los pagos están al día 👍</div>`:""}
         </div>`
      : Object.values(agrupados).map(grupo => {
          const p      = grupo[0];
          const monto  = parseFloat(p.monto) || 0;
          const fecha  = p.fecha?.toDate?.() ? formatFecha(p.fecha.toDate()) : "—";
          const ids    = grupo.map(x => x._id).join(",");
          const esCarrito = grupo.length > 1;
          const productos = grupo.map(x => `<span style="background:#f1f5f9;border-radius:6px;padding:2px 6px;font-size:10px;">${x.producto_emoji||"📦"} ${x.producto_nombre}</span>`).join(" ");
          const estado = p.payment_status;
          const col    = SC[estado] || "#9ca3af";
          const waNum  = `51${(p.tel||"").replace(/\D/g,"")}`;

          return `<div class="pago-card" style="border-left:4px solid ${col};">

            <!-- ESTADO BADGE -->
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <span style="background:${col}18;color:${col};border:1.5px solid ${col}44;
                font-size:10px;font-weight:800;padding:3px 10px;border-radius:99px;font-family:'DM Mono',monospace;">
                ${SL[estado]||estado}
              </span>
              <span style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;">${fecha}</span>
            </div>

            <!-- CLIENTE -->
            <div class="pago-header">
              <div class="pago-avatar" style="background:${col}18;border-color:${col}44;">
                ${esCarrito ? "🛒" : (p.producto_emoji||"📦")}
              </div>
              <div class="pago-info">
                <div class="pago-nombre">
                  ${p.nombre||"Cliente"}
                  ${p.es_lider?`<span style="background:#7c3aed;color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:99px;margin-left:6px;">👑 LÍDER</span>`:""}
                  ${p.sin_descuento?`<span style="background:#fef3c7;color:#d97706;font-size:9px;font-weight:800;padding:2px 7px;border-radius:99px;margin-left:4px;">⚠ SIN DESC.</span>`:""}
                  ${p.distancia_lider>1000?`<span style="background:#fee2e2;color:#dc2626;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:4px;">📍 ${(p.distancia_lider/1000).toFixed(1)}km del líder</span>`:(p.distancia_lider>0?`<span style="background:#dcfce7;color:#16a34a;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:4px;">📍 ${p.distancia_lider}m</span>`:"")}
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin:4px 0;">
                  <a href="https://wa.me/${waNum}" target="_blank"
                    style="background:#dcfce7;color:#15803d;border:1.5px solid #bbf7d0;border-radius:8px;
                    padding:3px 10px;font-size:11px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px;">
                    💬 ${p.tel||"—"}
                  </a>
                  <span style="background:#f1f5f9;color:#475569;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;">
                    📍 ${p.sector||"—"}
                  </span>
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">${productos}</div>
              </div>
              <div class="pago-monto" style="color:${col};">S/${monto.toFixed(1)}</div>
            </div>

            <!-- DATOS DE ENTREGA -->
            <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px;margin-bottom:12px;display:flex;flex-direction:column;gap:6px;">
              <div style="font-size:9px;font-weight:900;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;font-family:'DM Mono',monospace;">Datos de entrega</div>
              <div style="display:flex;align-items:flex-start;gap:6px;">
                <span style="font-size:13px;flex-shrink:0;">📍</span>
                <div>
                  <div style="font-size:10px;color:#94a3b8;font-weight:600;">Dirección</div>
                  <div style="font-size:12px;font-weight:700;color:${p.direccion?"#1e293b":"#ef4444"};">${p.direccion||"⚠ No registrada"}</div>
                </div>
              </div>
              ${p.referencia?`<div style="display:flex;align-items:flex-start;gap:6px;">
                <span style="font-size:13px;flex-shrink:0;">🚪</span>
                <div>
                  <div style="font-size:10px;color:#94a3b8;font-weight:600;">Referencia</div>
                  <div style="font-size:12px;font-weight:700;color:#1e293b;">${p.referencia}</div>
                </div>
              </div>`:""}
              ${p.horario?`<div style="display:flex;align-items:flex-start;gap:6px;">
                <span style="font-size:13px;flex-shrink:0;">🕐</span>
                <div>
                  <div style="font-size:10px;color:#94a3b8;font-weight:600;">Horario preferido</div>
                  <div style="font-size:12px;font-weight:700;color:#1e293b;">${p.horario}</div>
                </div>
              </div>`:""}
            </div>

            <!-- CAPTURA -->
            ${p.payment_screenshot_url
              ? `<div class="screenshot-wrap" onclick="window._verCaptura('${p.payment_screenshot_url}')">
                   <img src="${p.payment_screenshot_url}" class="screenshot-thumb" alt="Captura Yape">
                   <div class="screenshot-overlay">🔍 Ver captura completa</div>
                 </div>`
              : `<div class="no-screenshot">📭 Sin captura de pago</div>`}

            <!-- ACCIONES — solo si está pendiente -->
            ${estado === "uploaded" ? `
            <div class="pago-actions">
              <button class="btn-aprobar" onclick="window._aprobarPedidos('${ids}','${p.tel||''}','${p.nombre||''}',${monto})">✅ Aprobar</button>
              <button class="btn-rechazar" onclick="window._rechazarPedidos('${ids}')">❌ Rechazar</button>
              <a class="btn-wa-pago" title="Consultar por WhatsApp"
                href="https://wa.me/${waNum}?text=${encodeURIComponent(`Hola ${p.nombre||''}! 👋 Vi tu pedido de GruPay en ${p.sector||'tu sector'} por S/${monto.toFixed(1)}. ¿Tienes alguna consulta?`)}"
                target="_blank">💬</a>
            </div>` : `
            <!-- Si ya está resuelto, solo botón WA -->
            <div style="display:flex;gap:8px;margin-top:8px;">
              <a href="https://wa.me/${waNum}?text=${encodeURIComponent(`Hola ${p.nombre||''}! 👋 Te escribo por tu pedido de GruPay (${p.producto_nombre||'productos'}, sector ${p.sector||'—'}).`)}"
                target="_blank"
                style="flex:1;padding:10px;background:#f0fdf4;color:#15803d;border:2px solid #bbf7d0;
                border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;
                text-align:center;text-decoration:none;display:block;">
                💬 Contactar por WhatsApp
              </a>
            </div>`}
          </div>`;
        }).join("")}`;
}

window._filtrar = (estado) => {
  filtroEstado = estado;
  renderPagos();
};

window._aprobarPedidos = async (idsStr, tel, nombre, monto) => {
  const ids = idsStr.split(",");
  const card = document.getElementById(`pago-${ids[0]}`);
  if (card) { card.style.opacity="0.4"; card.style.pointerEvents="none"; }
  try {
    for (const id of ids) {
      await updateDoc(doc(db, "grupay_pedidos", id), {
        payment_status: "verified", verified_at: serverTimestamp()
      });
      // También actualizar member en subcollección
      const pedido = pedidos.find(p => p._id === id);
      if (pedido?.sector_id && pedido?.producto_id) {
        try {
          const mSnap = await getDocs(
            query(collection(db, "grupay_groups", pedido.producto_id, "sectors", pedido.sector_id, "members"),
              where("tel","==", pedido.tel))
          );
          for (const m of mSnap.docs) {
            await updateDoc(m.ref, { payment_status:"verified", verified_at:serverTimestamp() });
          }
        } catch(e) { console.warn("member update:", e.message); }
      }
    }
    // Cambiar filtro a "todos" para que el pedido aprobado siga visible
    filtroEstado = "todos";
    showToast("✅ Pago aprobado — ya está en pestaña Todos");
  } catch(e) {
    showToast("❌ Error: " + e.message);
    if (card) { card.style.opacity="1"; card.style.pointerEvents="auto"; }
  }
};

window._rechazarPedidos = async (idsStr) => {
  if (!confirm("¿Rechazar este pago?")) return;
  for (const id of idsStr.split(",")) {
    await updateDoc(doc(db, "grupay_pedidos", id), { payment_status: "rejected" });
  }
  // Cambiar filtro a "todos" para que el pedido rechazado siga visible
  filtroEstado = "todos";
  showToast("🗑 Pago rechazado");
};

// ── TAB GRUPOS ────────────────────────────────────────────────────────────────
function renderGrupos() {
  if (activeTab !== "grupos") return;
  const lista = Object.values(grupos);
  const container = document.getElementById("tab-content");
  if (!lista.length) {
    container.innerHTML = `<div class="empty-card"><div class="empty-icon">📦</div><div class="empty-title">Sin grupos</div></div>`;
    return;
  }
  const SC = { open:"#f59e0b", active:"#22c55e", cancelled:"#ef4444", completed:"#6366f1" };
  const SL = { open:"Abierto", active:"Activo", cancelled:"Cancelado", completed:"Completado" };
  container.innerHTML = lista.map(g => {
    const col  = SC[g.status]||"#9ca3af";
    const pend = pedidos.filter(p => p.producto_id===g.id && p.payment_status==="uploaded").length;
    const verif= pedidos.filter(p => p.producto_id===g.id && p.payment_status==="verified").length;
    return `<div class="grupo-card" onclick="window._verGrupo('${g.id}')">
      <div class="grupo-left">
        <div class="grupo-emoji">${g.emoji||"📦"}</div>
        <div>
          <div class="grupo-name">${g.product_name}</div>
          <div class="grupo-zone">📍 ${g.zone||"—"}</div>
          <div style="display:flex;gap:6px;margin-top:4px;">
            ${pend>0?`<span style="background:#fef9c3;color:#854d0e;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;">⏳ ${pend} pend.</span>`:""}
            ${verif>0?`<span style="background:#dcfce7;color:#15803d;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;">✅ ${verif} ok</span>`:""}
          </div>
        </div>
      </div>
      <div class="grupo-right">
        <div class="grupo-status" style="background:${col}22;color:${col};border:1px solid ${col}44">${SL[g.status]||g.status}</div>
        <div class="grupo-price">S/${(g.price_per_unit||0).toFixed(0)}</div>
        <div class="grupo-arrow">›</div>
      </div>
    </div>`;
  }).join("");
}

window._verGrupo = (groupId) => {
  const g = grupos[groupId];
  if (!g) return;
  activeTab = "detalle";
  const pedidosG = pedidos.filter(p => p.producto_id===groupId);
  const SC = { uploaded:"#f59e0b", verified:"#22c55e", rejected:"#ef4444" };
  const SL = { uploaded:"Pendiente", verified:"Aprobado", rejected:"Rechazado" };
  document.getElementById("tab-content").innerHTML = `
    <div class="detalle-header">
      <button class="btn-back" onclick="window._setTab('grupos')">← Grupos</button>
      <span class="detalle-title">${g.emoji||"📦"} ${g.product_name}</span>
    </div>
    <div class="detalle-stats-row">
      <div class="d-stat"><div class="d-stat-v">${pedidosG.filter(p=>p.payment_status==="verified").length}</div><div class="d-stat-l">Pagados</div></div>
      <div class="d-stat"><div class="d-stat-v">${pedidosG.filter(p=>p.payment_status==="uploaded").length}</div><div class="d-stat-l">Pendientes</div></div>
      <div class="d-stat"><div class="d-stat-v">S/${(g.price_per_unit||0).toFixed(0)}</div><div class="d-stat-l">Precio</div></div>
    </div>
    <div class="section-label">Pedidos (${pedidosG.length})</div>
    ${!pedidosG.length
      ? '<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">Sin pedidos aún</div>'
      : pedidosG.map(p => {
          const col=SC[p.payment_status]||"#9ca3af";
          return `<div class="member-row">
            <div class="member-avatar" style="background:${col}22;color:${col}">${(p.nombre||"?")[0].toUpperCase()}</div>
            <div class="member-info">
              <div class="member-name">${p.nombre||"Cliente"}</div>
              <div class="member-meta">📱 ${p.tel||"—"} · 📍 ${p.sector||"—"} · S/${parseFloat(p.monto||0).toFixed(1)}</div>
            </div>
            <div class="member-status" style="background:${col}22;color:${col};border:1px solid ${col}44">${SL[p.payment_status]||p.payment_status}</div>
          </div>`;
        }).join("")}
    <div class="section-label" style="margin-top:20px;">Acciones</div>
    <div class="quick-actions">
      ${g.status==="open"?`<button class="qa-btn qa-green" onclick="window._forzarActivar('${groupId}')">⚡ Activar grupo</button>`:""}
      ${g.status!=="cancelled"?`<button class="qa-btn qa-red" onclick="window._cancelarGrupo('${groupId}')">❌ Cancelar grupo</button>`:""}
    </div>`;
};

window._forzarActivar = async (gid) => {
  if (!confirm("¿Activar el grupo manualmente?")) return;
  await updateDoc(doc(db,"grupay_groups",gid),{status:"active"});
  showToast("⚡ Grupo activado"); window._setTab("grupos");
};
window._cancelarGrupo = async (gid) => {
  if (!confirm("¿Cancelar este grupo?")) return;
  await updateDoc(doc(db,"grupay_groups",gid),{status:"cancelled"});
  showToast("❌ Grupo cancelado"); window._setTab("grupos");
};

// ── TAB NUEVO GRUPO ───────────────────────────────────────────────────────────
function renderNuevoGrupo() {
  document.getElementById("tab-content").innerHTML = `
    <div class="form-section">
      <div class="form-title">➕ Nuevo Grupo</div>
      <label class="form-label">Emoji</label>
      <input id="ng-emoji" class="form-input" placeholder="📦" maxlength="2" value="📦">
      <label class="form-label">Nombre del producto</label>
      <input id="ng-nombre" class="form-input" placeholder="Queso Fresco 1kg">
      <label class="form-label">Precio por unidad (S/)</label>
      <input id="ng-precio" class="form-input" type="number" placeholder="14.00" step="0.50">
      <label class="form-label">Unidad (kg, und, 250g…)</label>
      <input id="ng-unit" class="form-input" placeholder="kg" value="kg">
      <label class="form-label">Mínimo de personas</label>
      <input id="ng-min" class="form-input" type="number" value="5" min="2">
      <label class="form-label">Zona de entrega</label>
      <input id="ng-zona" class="form-input" placeholder="San Borja">
      <button class="btn-crear-grupo" onclick="window._crearGrupo()">🚀 Crear Grupo</button>
    </div>`;
}

window._crearGrupo = async () => {
  const nombre = document.getElementById("ng-nombre").value.trim();
  const emoji  = document.getElementById("ng-emoji").value.trim()||"📦";
  const precio = parseFloat(document.getElementById("ng-precio").value);
  const unit   = document.getElementById("ng-unit").value.trim()||"kg";
  const min    = parseInt(document.getElementById("ng-min").value)||5;
  const zona   = document.getElementById("ng-zona").value.trim();
  if (!nombre||!precio||!zona) { showToast("⚠ Completa nombre, precio y zona"); return; }
  const btn = document.querySelector(".btn-crear-grupo");
  btn.textContent="Creando..."; btn.disabled=true;
  try {
    await addDoc(collection(db,"grupay_groups"),{
      product_name:nombre, emoji, price_per_unit:precio, unit,
      min_members:min, current_count:0, status:"open", has_discount:true,
      zone:zona, delivery_point:zona, created_at:serverTimestamp()
    });
    showToast("🎉 Grupo creado"); window._setTab("grupos");
  } catch(e) {
    showToast("❌ Error: "+e.message);
    btn.textContent="🚀 Crear Grupo"; btn.disabled=false;
  }
};

// ── TAB SOPORTE ───────────────────────────────────────────────────────────────
function renderSoporte() {
  if (activeTab !== "soporte") return;
  const container = document.getElementById("tab-content");
  const pend  = soportes.filter(s => s.estado === "pendiente");
  const atend = soportes.filter(s => s.estado === "atendido");

  if (!soportes.length) {
    container.innerHTML = `<div class="empty-card"><div class="empty-icon">🙌</div><div class="empty-title">Sin consultas</div><div class="empty-sub">Nadie ha pedido soporte aún</div></div>`;
    return;
  }

  const renderGrupo = (lista, titulo, color) => {
    if (!lista.length) return "";
    return `
      <div style="font-size:10px;font-weight:900;color:${color};text-transform:uppercase;
        letter-spacing:2px;font-family:'DM Mono',monospace;margin:14px 0 8px;">${titulo} (${lista.length})</div>
      ${lista.map(s => {
        const fecha = s.fecha?.toDate?.() ? formatFecha(s.fecha.toDate()) : "—";
        const waNum = `51${(s.tel||"").replace(/\D/g,"")}`;
        const canal = s.canal === "whatsapp_karla" ? "🤖 Karla" : "💬 WA Directo";
        const esPend = s.estado === "pendiente";
        return `<div style="background:#fff;border:2px solid ${esPend?"#fde68a":"#e2e8f0"};
          border-left:4px solid ${esPend?"#d97706":"#22c55e"};
          border-radius:14px;padding:14px;margin-bottom:10px;
          box-shadow:0 2px 8px rgba(0,0,0,.04);">

          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <div>
              <div style="font-size:15px;font-weight:800;">${s.nombre||"Visitante"}</div>
              <div style="font-size:10px;color:var(--muted);margin-top:2px;">${canal} · ${fecha}</div>
              ${s.sector ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;">📍 ${s.sector}</div>` : ""}
              ${s.consulta ? `<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;margin-top:8px;font-size:12px;color:#334155;font-style:italic;">"${s.consulta}"</div>` : ""}
            </div>
            <span style="background:${esPend?"#fef9c3":"#dcfce7"};color:${esPend?"#854d0e":"#15803d"};
              border:1.5px solid ${esPend?"#fde68a":"#bbf7d0"};font-size:9px;font-weight:800;
              padding:3px 8px;border-radius:99px;white-space:nowrap;font-family:'DM Mono',monospace;">
              ${esPend?"⏳ Pendiente":"✅ Atendido"}
            </span>
          </div>

          <div style="display:flex;gap:8px;">
            ${s.tel ? `
              <a href="https://wa.me/${waNum}?text=${encodeURIComponent(`Hola ${s.nombre||''}! 👋 Vi que necesitas ayuda con GruPay. ¿En qué te puedo ayudar?`)}"
                target="_blank"
                style="flex:1;padding:10px;background:#f0fdf4;color:#15803d;border:2px solid #bbf7d0;
                border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;
                text-align:center;text-decoration:none;display:block;">
                💬 WhatsApp ${s.tel}
              </a>` : `<div style="flex:1;padding:10px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:10px;font-size:12px;color:var(--muted);text-align:center;">Sin número registrado</div>`}
            ${esPend ? `
              <button onclick="window._marcarAtendido('${s._id}')"
                style="padding:10px 14px;background:#f0fdf4;color:#15803d;border:2px solid #bbf7d0;
                border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;cursor:pointer;">
                ✅ Marcar atendido
              </button>` : ""}
          </div>
        </div>`;
      }).join("")}`;
  };

  container.innerHTML =
    renderGrupo(pend,  "⏳ Pendientes", "#d97706") +
    renderGrupo(atend, "✅ Atendidos",  "#16a34a");
}

window._marcarAtendido = async (id) => {
  await updateDoc(doc(db, "grupay_soporte", id), {
    estado: "atendido", atendido_at: serverTimestamp()
  });
  showToast("✅ Consulta marcada como atendida");
};

// ── TABS ──────────────────────────────────────────────────────────────────────
window._setTab = (tab) => {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b =>
    b.classList.toggle("tab-active", b.dataset.tab === tab));
  if (tab==="pagos")   renderPagos();
  if (tab==="grupos")  renderGrupos();
  if (tab==="nuevo")   renderNuevoGrupo();
  if (tab==="soporte") renderSoporte();
};

window._verCaptura = (url) => {
  document.getElementById("lightbox-img").src = url;
  document.getElementById("lightbox").classList.add("on");
};
window._cerrarLightbox = () => document.getElementById("lightbox").classList.remove("on");

function formatFecha(d) {
  return d.toLocaleString("es-PE",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
}
let _tt;
function showToast(msg,dur=3000){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("on");
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove("on"),dur);
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{

.topbar-ic{width:32px;height:32px;background:linear-gradient(135deg,#14532d,#16a34a);

.topbar-name{font-size:17px;font-weight:900;letter-spacing:-.5px;}
.topbar-name span{color:var(--green);}
.topbar-badge{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;}
.stats-bar{display:flex;background:#fff;border-bottom:2px solid var(--border);flex-shrink:0;}
.stat-item{flex:1;padding:10px 6px;text-align:center;border-right:1px solid var(--border);}
.stat-item:last-child{border-right:none;}
.stat-num{font-size:22px;font-weight:900;line-height:1;}
.stat-num.amber{color:var(--amber);}
.stat-num.green{color:var(--green);}
.stat-lbl{font-size:8px;color:var(--muted);font-family:'DM Mono',monospace;

.scroll-area{flex:1;overflow-y:auto;padding:14px;background:var(--bg);}
.tabs{display:flex;border-top:2px solid var(--border);flex-shrink:0;background:#fff;}
.tab-btn{flex:1;padding:11px 4px 10px;background:none;border:none;

  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
  position:relative;transition:color .2s;}
.tab-btn.tab-active{color:var(--green);}
.tab-btn.tab-active::after{content:'';position:absolute;top:0;left:20%;right:20%;

.tab-icon{font-size:18px;}
.tab-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);

  display:none;align-items:center;justify-content:center;}
.pago-card{background:#fff;border:2px solid var(--border);border-radius:16px;
  padding:14px;margin-bottom:12px;transition:opacity .3s;

.pago-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.pago-avatar{width:46px;height:46px;background:var(--amber-l);border:1.5px solid var(--amber-b);

.pago-info{flex:1;}

.pago-tel,.pago-hora{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.pago-monto{font-size:24px;font-weight:900;color:var(--amber);flex-shrink:0;}
.screenshot-wrap{position:relative;border-radius:12px;overflow:hidden;

.screenshot-thumb{width:100%;height:180px;object-fit:cover;display:block;}

.screenshot-wrap:hover .screenshot-overlay,.screenshot-wrap:active .screenshot-overlay{opacity:1;}
.no-screenshot{background:var(--bg);border:2px dashed var(--border);border-radius:10px;

.pago-actions{display:flex;gap:8px;}
.btn-aprobar{flex:2;padding:12px;background:var(--green-l);color:var(--green-d);

.btn-rechazar{flex:1;padding:12px;background:var(--red-l);color:var(--red);

  font-family:'Syne',sans-serif;font-weight:800;font-size:12px;cursor:pointer;}
.btn-wa-pago{flex:0 0 46px;padding:12px;background:var(--green-l);color:var(--green-d);

.grupo-card{background:#fff;border:2px solid var(--border);border-radius:14px;

.grupo-card:hover{border-color:var(--green);}
.grupo-left{display:flex;gap:10px;flex:1;align-items:center;min-width:0;}
.grupo-emoji{width:42px;height:42px;background:var(--green-l);border:1.5px solid var(--green-b);

.grupo-name{font-size:13px;font-weight:800;margin-bottom:2px;

.grupo-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}

.grupo-price{font-size:17px;font-weight:900;color:var(--green);}
.grupo-arrow{font-size:18px;color:var(--subtle);}
.detalle-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.btn-back{background:#fff;border:2px solid var(--border);color:var(--muted);
  padding:7px 12px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}
.detalle-title{font-size:15px;font-weight:900;flex:1;}
.detalle-stats-row{display:flex;gap:8px;margin-bottom:20px;}
.d-stat{flex:1;background:#fff;border:2px solid var(--border);border-radius:12px;padding:10px;text-align:center;}
.d-stat-v{font-size:16px;font-weight:900;color:var(--green);}
.d-stat-l{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.section-label{font-size:10px;font-weight:900;color:var(--muted);
  text-transform:uppercase;letter-spacing:2px;font-family:'DM Mono',monospace;margin-bottom:10px;}
.member-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
.member-avatar{width:36px;height:36px;border-radius:10px;display:flex;

.member-info{flex:1;}
.member-name{font-size:13px;font-weight:800;}
.member-meta{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}

.qa-btn{padding:13px;border-radius:12px;font-family:'Syne',sans-serif;font-weight:800;

.empty-card{text-align:center;padding:60px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;}

.lightbox{display:none;position:fixed;inset:0;background:rgba(15,20,30,.88);

  background:var(--text);color:#fff;padding:11px 20px;border-radius:14px;
  font-size:13px;font-weight:700;z-index:300;opacity:0;white-space:nowrap;
  transition:all .25s;pointer-events:none;}

</style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-ic">🛒</div>
