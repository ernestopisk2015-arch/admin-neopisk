<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e85d00">
<title>NeoPisk Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f0;
  --surface:#ffffff;
  --surface2:#f0ede6;
  --border:#e2ddd5;
  --text:#1a1614;
  --text2:#4a4540;
  --text3:#8a8278;
  --orange:#e85d00;
  --orange-bg:#fff3eb;
  --orange-mid:#ffd5b8;
  --green:#0d7a3e;
  --green-bg:#e8f7ee;
  --red:#c8200a;
  --red-bg:#fde8e5;
  --blue:#1a5cd8;
  --blue-bg:#e8eeff;
  --yellow:#c89500;
  --yellow-bg:#fff8de;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 12px 32px rgba(0,0,0,.12);
  --sidebar:240px;
  --radius:14px;
  --font-head:'Syne',sans-serif;
  --font-body:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* LOGIN */
#login-screen{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg);z-index:1000;
}
.login-card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:48px 40px;width:min(380px,90vw);box-shadow:var(--shadow-lg);
  animation:fadeIn .4s ease;
}
.login-logo{font-size:40px;text-align:center;margin-bottom:8px}
.login-title{font-family:var(--font-head);font-size:26px;text-align:center;color:var(--text);margin-bottom:4px}
.login-sub{text-align:center;color:var(--text3);font-size:12px;margin-bottom:32px}
.login-label{font-size:11px;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.08em}
.login-input{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-family:var(--font-body);font-size:14px;background:var(--surface2);color:var(--text);
  outline:none;transition:border .2s;margin-bottom:16px;
}
.login-input:focus{border-color:var(--orange)}
.login-btn{
  width:100%;padding:13px;background:var(--orange);color:#fff;border:none;border-radius:11px;
  font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.login-btn:hover{opacity:.9}
.login-btn:active{transform:scale(.98)}
.login-err{color:var(--red);font-size:12px;margin-top:-8px;margin-bottom:12px;display:none}

/* APP SHELL */
#app{display:none;height:100vh;display:none;flex-direction:column}
#app.visible{display:flex}

.topbar{
  height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:50;
  box-shadow:var(--shadow-sm);
}
.topbar-menu{
  width:36px;height:36px;border:none;background:var(--surface2);border-radius:9px;
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);
}
.topbar-title{font-family:var(--font-head);font-size:16px;font-weight:800;flex:1;color:var(--text)}
.topbar-status{
  display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);
  background:var(--green-bg);padding:5px 10px;border-radius:20px;border:1px solid #b8e8cc;
}
.topbar-status::before{content:'';width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
.topbar-clock{font-size:12px;color:var(--text2);background:var(--surface2);padding:5px 10px;border-radius:20px;border:1px solid var(--border)}

.main-wrap{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;transition:transform .3s ease;
  flex-shrink:0;
}
.sb-head{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-logo-icon{font-size:22px}
.sb-logo-text{font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--text)}
.sb-logo-ver{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 6px;border-radius:6px;border:1px solid var(--border)}
.sb-nav{padding:10px 8px;flex:1}
.sb-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  cursor:pointer;color:var(--text2);font-size:13px;margin-bottom:2px;transition:all .15s;
  border:1px solid transparent;
}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-mid);font-weight:600}
.sb-item .icon{font-size:16px;width:22px;text-align:center}
.sb-foot{padding:12px 16px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px}
.sb-avatar{width:32px;height:32px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.sb-uname{font-size:12px;font-weight:600;color:var(--text)}
.sb-urole{font-size:10px;color:var(--text3)}

/* OVERLAY */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49;backdrop-filter:blur(2px)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px}
.view{display:none;animation:slideUp .3s ease}
.view.active{display:block}

/* CARDS / COMPONENTS */
.section-title{font-family:var(--font-head);font-size:20px;font-weight:800;color:var(--text);margin-bottom:16px}
.section-sub{font-size:12px;color:var(--text3);margin-bottom:20px;margin-top:-10px}

.k4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.k3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.k2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:20px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm)}
.card-title{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}

.kpi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);
}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.orange::before{background:var(--orange)}
.kpi-card.green::before{background:var(--green)}
.kpi-card.red::before{background:var(--red)}
.kpi-card.blue::before{background:var(--blue)}
.kpi-icon{font-size:20px;margin-bottom:8px}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi-value{font-family:var(--font-head);font-size:26px;font-weight:800;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}

.alert-box{border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;border:1px solid}
.alert-box.red{background:var(--red-bg);border-color:#f5bfbb;color:var(--red)}
.alert-box.yellow{background:var(--yellow-bg);border-color:#f5e8b0;color:var(--yellow)}
.alert-box.green{background:var(--green-bg);border-color:#b8e8cc;color:var(--green)}
.alert-head{font-weight:700;font-size:13px;margin-bottom:4px}
.alert-body{font-size:12px;opacity:.85}

.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.chip.green{background:var(--green-bg);color:var(--green)}
.chip.red{background:var(--red-bg);color:var(--red)}
.chip.orange{background:var(--orange-bg);color:var(--orange)}
.chip.yellow{background:var(--yellow-bg);color:var(--yellow)}
.chip.blue{background:var(--blue-bg);color:var(--blue)}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  background:var(--surface2);padding:10px 12px;text-align:left;
  font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);
  border-bottom:1px solid var(--border);font-weight:600;
  position:sticky;top:0;
}
tbody td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
tbody tr:hover td{background:var(--surface2)}
tbody tr:last-child td{border-bottom:none}

.map-box{
  background:linear-gradient(145deg,#d8f0e2,#c8e8d5);
  border:1px solid #b0d8c0;border-radius:var(--radius);height:220px;
  position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.map-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,100,50,.1) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,100,50,.1) 1px,transparent 1px);
  background-size:30px 30px;
}
.map-car{position:absolute;font-size:18px;animation:moveCar 4s infinite alternate ease-in-out}
.map-pin{position:absolute;font-size:20px}
.map-label{position:absolute;font-size:10px;background:rgba(255,255,255,.85);padding:2px 6px;border-radius:6px;font-weight:600}

.progress-wrap{margin-bottom:12px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px}
.progress-bar{height:8px;background:var(--surface2);border-radius:20px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;border-radius:20px;transition:width .6s ease}
.progress-fill.orange{background:var(--orange)}
.progress-fill.green{background:var(--green)}
.progress-fill.blue{background:var(--blue)}

.bar-chart{display:flex;align-items:flex-end;gap:8px;height:100px;padding:8px 0}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;background:var(--orange-mid);border-radius:4px 4px 0 0;transition:height .6s ease;min-width:20px;position:relative;cursor:pointer}
.bar:hover{background:var(--orange)}
.bar-val{font-size:10px;color:var(--text3);position:absolute;top:-16px;width:100%;text-align:center}
.bar-day{font-size:10px;color:var(--text3)}

.schema-table{width:100%;font-size:12px;border-collapse:collapse}
.schema-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.schema-table td:first-child{color:var(--orange);font-weight:600;width:140px}
.schema-table td:nth-child(2){color:var(--blue);width:100px}
.schema-table td:last-child{color:var(--text3)}
.schema-section{background:var(--surface2);padding:12px 16px;border-radius:10px;margin-bottom:12px}
.schema-head{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.badge{font-size:10px;padding:2px 6px;border-radius:5px;background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-mid)}

.algo-steps{display:flex;flex-direction:column;gap:12px}
.algo-step{display:flex;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.algo-num{
  width:32px;height:32px;background:var(--orange);color:#fff;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-family:var(--font-head);
  font-weight:800;font-size:15px;flex-shrink:0;
}
.algo-body{}
.algo-title{font-weight:700;font-size:13px;color:var(--text);margin-bottom:4px}
.algo-desc{font-size:12px;color:var(--text3);line-height:1.6}
.algo-code{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;font-size:11px;color:var(--blue);margin-top:8px;
  font-family:var(--font-body);
}

/* TOAST */
#toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:var(--text);color:#fff;padding:12px 18px;border-radius:12px;
  font-size:13px;box-shadow:var(--shadow-lg);display:none;
  animation:slideUp .2s ease;max-width:280px;
}
#toast.green{background:var(--green)}
#toast.red{background:var(--red)}
#toast.orange{background:var(--orange)}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes moveCar{
  0%{transform:translate(0,0)}
  33%{transform:translate(20px,-10px)}
  66%{transform:translate(-10px,15px)}
  100%{transform:translate(15px,5px)}
}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* RESPONSIVE */
@media(max-width:899px){
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:50;
    transform:translateX(-100%);
  }
  #sidebar.open{transform:translateX(0)}
  #overlay.show{display:block}
  .k4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:1fr}
}
@media(max-width:480px){
  .k4,.k3,.k2,.g2{grid-template-columns:1fr}
  .content{padding:14px}
  .topbar-clock{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🍊</div>

    <input class="login-input" id="l-user" value="admin" readonly>

<div id="app">

        </div>
      </div>
      <div class="sb-nav" id="sb-nav"></div>

    <!-- OVERLAY -->

    <!-- CONTENT -->
    <div class="content">

      <div class="view" id="v-mapa"></div>

      <div class="view" id="v-bunker"></div>

      <div class="view" id="v-schema"></div>
      <div class="view" id="v-algoritmo"></div>

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module">
// ── FIREBASE ──────────────────────────────────────────────────────────
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, update, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyBhnAKQfADIdNX4brbG-YdTEr-DKFta7jE",
  authDomain: "neopisk.firebaseapp.com",
  databaseURL: "https://neopisk-default-rtdb.firebaseio.com",
  projectId: "neopisk",
  storageBucket: "neopisk.firebasestorage.app",
  messagingSenderId: "873475816427",
  appId: "1:873475816427:web:fa8ca59cb85a2c1d00f7ae"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// Estado en tiempo real
let CONDUCTORES_RT = [];
let PEDIDOS_RT = [];

function listenFirebase() {
  // Escuchar conductores
  onValue(ref(db, 'conductores'), snap => {
    const data = snap.val() || {};
    CONDUCTORES_RT = Object.entries(data).map(([id, v]) => ({
      id, nombre: v.nombre||id, placa: v.placa||'—',
      estado: v.estado||'desconectado', vel: v.velocidad||0,
      dist: v.km_hoy||0, docs: v.docs||'OK',
      lat: v.lat||-12.05, lng: v.lng||-77.03, online: v.online||false
    }));
    vDash(); vMapa(); vConds();
    // KPI badge en sidebar
    const activos = CONDUCTORES_RT.filter(c => c.online).length;
    document.getElementById('kpi-conductores')?.setAttribute('data-val', activos);
  });

  // Escuchar pedidos
  onValue(ref(db, 'pedidos'), snap => {
    const data = snap.val() || {};
    PEDIDOS_RT = Object.entries(data).map(([id, v]) => ({
      id, origen: v.origen||'—', destino: v.destino||'—',
      estado: v.estado||'pendiente', monto: v.monto||50,
      hora: v.ts_creado ? new Date(v.ts_creado).toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}) : '—'
    }));
    vDash(); vBunker();
  });
}

// Acción admin: cambiar estado conductor
window.setConductorEstado = function(cid, estado) {
  update(ref(db, `conductores/${cid}`), { estado });
  toast(`Conductor ${cid} → ${estado}`, 'orange');
};

// ── DATA ─────────────────────────────────────────────────────────────
const NAVS = [
  {id:'dashboard',icon:'📊',label:'Dashboard'},
  {id:'mapa',icon:'🗺️',label:'Mapa en Vivo'},

  {id:'bunker',icon:'📦',label:'Búnker · Pedidos'},
  {id:'liquidacion',icon:'💰',label:'Liquidación'},
  {id:'schema',icon:'🗄️',label:'Base de Datos'},
  {id:'algoritmo',icon:'⚙️',label:'Algoritmo'},
];

const CONDUCTORES = [
  {id:'C01',nombre:'Carlos Huanca',placa:'ABC-123',estado:'En ruta',vel:48,dist:12.4,docs:'OK',lat:-12.04,lng:-77.02},
  {id:'C02',nombre:'Pedro Quispe', placa:'DEF-456',estado:'Disponible',vel:0,dist:0,docs:'OK',lat:-12.07,lng:-77.05},
  {id:'C03',nombre:'Luis Mamani',  placa:'GHI-789',estado:'En ruta',vel:67,dist:8.1,docs:'Vencidos',lat:-12.10,lng:-77.01},
  {id:'C04',nombre:'Ana Flores',   placa:'JKL-012',estado:'Entregando',vel:12,dist:3.2,docs:'OK',lat:-12.06,lng:-77.04},
];

const PEDIDOS = [
  {id:'P001',origen:'San Borja',destino:'Surco',estado:'Listo',monto:50,hora:'08:12'},
  {id:'P002',origen:'Surco',destino:'San Borja',estado:'Listo',monto:50,hora:'08:45'},
  {id:'P003',origen:'San Borja',destino:'Miraflores',estado:'Listo',monto:50,hora:'09:01'},
  {id:'P004',origen:'Miraflores',destino:'San Borja',estado:'Listo',monto:50,hora:'09:20'},
  {id:'P005',origen:'San Borja',destino:'Surco',estado:'Listo',monto:50,hora:'09:38'},
  {id:'P006',origen:'Surco',destino:'San Isidro',estado:'En ruta',monto:50,hora:'09:55'},
  {id:'P007',origen:'San Borja',destino:'Barranco',estado:'Entregado',monto:50,hora:'10:10'},
];

const SCHEMA = [
  {name:'Usuarios',icon:'👤',badge:'PK:uid',fields:[
    ['uid','STRING','ID único Firebase'],
    ['nombre','STRING','Nombre completo'],
    ['telefono','STRING','WhatsApp/Telegram'],
    ['rol','ENUM','admin | conductor | cliente'],
    ['activo','BOOL','Estado de cuenta'],
  ]},
  {name:'Vehiculos',icon:'🚗',badge:'FK:uid',fields:[
    ['vid','STRING','ID vehículo'],

    ['placa','STRING','Placa peruana'],
    ['modelo','STRING','Changan / BYD / BAJAJ'],
    ['tipo','ENUM','electrico | hibrido'],

  {name:'Rutas',icon:'📍',badge:'FK:vid',fields:[

    ['vehiculo_vid','STRING','FK → Vehiculos'],
    ['inicio_ts','TIMESTAMP','Inicio del viaje'],
    ['fin_ts','TIMESTAMP','Fin del viaje'],
    ['distancia_km','FLOAT','Kilómetros recorridos'],
  ]},
  {name:'Transacciones',icon:'💳',badge:'FK:uid',fields:[
    ['tid','STRING','ID transacción'],
    ['usuario_uid','STRING','FK → Usuarios'],
    ['monto','FLOAT','S/ en soles'],
    ['tipo','ENUM','viaje | recarga | comision'],
    ['estado','ENUM','pendiente | ok | error'],
  ]},

const ALGO = [

// ── UTILS ─────────────────────────────────────────────────────────────
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=type;t.style.display='block';
  setTimeout(()=>t.style.display='none',2800);
}
function sv(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-'+id).classList.add('active');
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.toggle('active',i.dataset.view===id));
  closeSb();
}
function openSb(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show')}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}

function doLogin(){
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err');
  if(pass==='123'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    buildNav();renderAll();startClock();listenFirebase();
    toast('Bienvenido, Admin 🍊','orange');
  } else {
    err.style.display='block';
    document.getElementById('login-screen').querySelector('.login-card').style.animation='shk .3s ease';
    setTimeout(()=>document.getElementById('login-screen').querySelector('.login-card').style.animation='',400);
  }
}
